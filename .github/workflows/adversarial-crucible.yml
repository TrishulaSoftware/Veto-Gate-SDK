name: "ADVERSARIAL CRUCIBLE - NIGHTLY AUDIT"
on:
  schedule:
    - cron: '0 2 * * *' # 2:00 AM UTC
  workflow_dispatch:

jobs:
  adversarial_audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Checkout Security-Janitor
        uses: actions/checkout@v4
        with:
          repository: TrishulaSoftware/Security-Janitor
          path: Security-Janitor

      - name: Install dependencies
        run: |
          pip install gitpython
          if [ -f Security-Janitor/requirements.txt ]; then pip install -r Security-Janitor/requirements.txt; fi

      - name: "CRUCIBLE: Hardcoded Password Simulation"
        run: |
            echo "Injecting Stochastic Feral Signatures..."
            mkdir -p crucible_temp
            echo "password = 'SuperSecret123'" > crucible_temp/secrets.py
            
            # Run Janitor. Expectation: IT MUST DETECT 1 FINDING (SEC002).
            python Security-Janitor/janitor_core.py --target crucible_temp --dry-run > audit.log 2>&1
            grep "SEC002" audit.log
