name: "L0 SENTINEL WELD - ASCENSION v1.5"

on:
  push:
    branches: [ "SOVEREIGN" ]
  pull_request:
    branches: [ "SOVEREIGN" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  weld_verification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: "Pillar 1: MC/DC Determinism (ASCII Weld Check)"
        run: |
            echo "Scanning for Prose-Drift (Rule TS-005)..."
            python -m compileall -q .
            
      - name: "Pillar 4: Merkle Persistence Audit"
        run: |
            echo "Verifying State Persistence Signature..."
            CURRENT_SHA=$(git rev-parse HEAD)
            echo "Current Sovereign Manifest: $CURRENT_SHA"
